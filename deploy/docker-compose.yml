services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dash_atestados}
      POSTGRES_USER: ${POSTGRES_USER:-dash_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dash_user} -d ${POSTGRES_DB:-dash_atestados}"]
      interval: 10s
      timeout: 5s
      retries: 8

  app:
    build:
      context: ..
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DASH_HOST: 0.0.0.0
      DASH_PORT: 8000
      DASH_ADMIN_USER: ${DASH_ADMIN_USER:-admin}
      DASH_ADMIN_PASSWORD: ${DASH_ADMIN_PASSWORD:?defina DASH_ADMIN_PASSWORD}
      DASH_COOKIE_SECURE: ${DASH_COOKIE_SECURE:-1}
      DATABASE_URL: postgresql://${POSTGRES_USER:-dash_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-dash_atestados}
    volumes:
      - app_storage:/app/storage
    ports:
      - "${APP_PORT:-8000}:8000"

volumes:
  postgres_data:
  app_storage:
